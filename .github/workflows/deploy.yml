name: CI/CD Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Rename JAR
      run: mv target/*.jar app.jar

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "app.jar"
        target: "/home/ubuntu/app"

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd /home/ubuntu/app

          set -e

          # Find old app process
          PID=$(pgrep -f 'app.jar') || true
          
          if [ ! -z "$PID" ]; then
              echo "Old application running with PID $PID"
              
              # Try to kill it gracefully
              kill -15 $PID || true
              sleep 2
              
              # Check if process is still alive
              if kill -0 $PID 2>/dev/null; then
                  echo "Failed to stop old application. Process $PID still running."
              else
                  echo "Old application successfully stopped."
              fi
          else
              echo "No old application running. Proceeding..."
          fi
          
          # Start new app detached
          nohup java -jar app.jar > app.log 2>&1 & disown
          
          echo "Deployment completed"
          exit 0
