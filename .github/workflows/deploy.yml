name: CI/CD Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Rename JAR
      run: mv target/*.jar app.jar

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "app.jar"
        target: "/home/ubuntu/app"

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd /home/ubuntu/app

          # Stop old app if exists
          PID=$(pgrep -f 'app.jar')
          if [ ! -z "$PID" ]; then
              echo "Killing existing app $PID"
              kill -15 $PID || true
              sleep 2
          fi
          
          # Start new app detached
          nohup java -jar app.jar > app.log 2>&1 & disown
          
          echo "Deployment completed"
          exit 0
