name: CI/CD Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Rename JAR
      run: mv target/*.jar app.jar

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "app.jar"
        target: "/home/ubuntu/app"

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
         echo "🚀 Starting deployment..."

          set +e
          
          cd /home/***/app || { echo "❌ Directory not found"; exit 1; }
          
          echo "📂 Current directory: $(pwd)"
          
          # Kill old app WITHOUT triggering SSH termination
          echo "🛑 Stopping old application if running..."
          pkill -f app.jar || true
          
          sleep 3
          
          # Verify stop
          PID=$(pgrep -f 'app.jar')
          if [ -n "$PID" ]; then
          echo "❌ Failed to stop old application. Still running with PID $PID"
          else
          echo "✅ Old application successfully stopped"
          fi
          
          echo "🆕 Starting new application..."
          
          nohup java -jar app.jar > app.log 2>&1 &
          
          sleep 3
          
          NEW_PID=$(pgrep -f 'app.jar')
          
          if [ -n "$NEW_PID" ]; then
          echo "✅ New application started successfully with PID $NEW_PID"
          else
          echo "❌ Failed to start new application. Check logs:"
          tail -n 50 app.log
          exit 1
          fi
          
          echo "🎉 Deployment completed successfully"
          exit 0
