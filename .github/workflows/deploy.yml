name: CI/CD Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Rename JAR (versioned)
      run: mv target/*.jar app_$(date +%s).jar

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        source: "app_*.jar"
        target: "/home/ubuntu/app"

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          echo "🚀 Starting deployment..."

          cd /home/ubuntu/app

          # Get latest uploaded jar
          JAR=$(ls -t app_*.jar | head -n 1)

          echo "📦 Latest JAR: $JAR"

          echo "🆕 Starting new application on new port..."

          nohup java -jar $JAR --server.port=8081 > app.log 2>&1 &

          echo "🎉 Deployment completed successfully"
          exit 0
